<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="محول العملات - أسعار صرف حية ومباشرة" />
  <meta name="theme-color" content="#4f46e5" />
  <title>محول العملات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="page-wrapper">

    <header class="site-header">
      <div class="header-icon">💱</div>
      <h1 class="site-title">محوّل العملات</h1>
      <p class="site-subtitle">أسعار صرف حية ومحدّثة لحظة بلحظة</p>
    </header>

    <main class="converter-card">

      <div class="rate-bar" id="rateBar">
        <span class="rate-dot" id="rateDot"></span>
        <span class="rate-bar-text" id="rateBarText">جاري جلب أسعار الصرف…</span>
      </div>

      <section class="field-group">
        <label class="field-label" for="fromAmount">من</label>
        <div class="field-row">
          <input type="number" id="fromAmount" class="amount-input"
            placeholder="0.00" min="0" step="0.01"
            inputmode="decimal" autocomplete="off"
            aria-label="المبلغ المراد تحويله" />
          <div class="currency-select-wrapper">
            <select id="fromCurrency" class="currency-select" aria-label="العملة الأصلية">
              <option value="USD">🇺🇸 USD</option>
              <option value="EGP" selected>🇪🇬 EGP</option>
              <option value="EUR">🇪🇺 EUR</option>
              <option value="GBP">🇬🇧 GBP</option>
              <option value="SAR">🇸🇦 SAR</option>
              <option value="AED">🇦🇪 AED</option>
              <option value="KWD">🇰🇼 KWD</option>
              <option value="TRY">🇹🇷 TRY</option>
            </select>
          </div>
        </div>
        <div class="currency-name" id="fromCurrencyName">جنيه مصري</div>
      </section>

      <div class="swap-row">
        <div class="divider-line"></div>
        <button class="swap-btn" id="swapBtn" aria-label="تبديل العملتين">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 16V4m0 0L3 8m4-4l4 4"/>
            <path d="M17 8v12m0 0l4-4m-4 4l-4-4"/>
          </svg>
        </button>
        <div class="divider-line"></div>
      </div>

      <section class="field-group">
        <label class="field-label" for="toAmount">إلى</label>
        <div class="field-row">
          <input type="number" id="toAmount" class="amount-input result-input"
            placeholder="0.00" readonly
            aria-label="المبلغ بعد التحويل" />
          <div class="currency-select-wrapper">
            <select id="toCurrency" class="currency-select" aria-label="العملة المستهدفة">
              <option value="USD" selected>🇺🇸 USD</option>
              <option value="EGP">🇪🇬 EGP</option>
              <option value="EUR">🇪🇺 EUR</option>
              <option value="GBP">🇬🇧 GBP</option>
              <option value="SAR">🇸🇦 SAR</option>
              <option value="AED">🇦🇪 AED</option>
              <option value="KWD">🇰🇼 KWD</option>
              <option value="TRY">🇹🇷 TRY</option>
            </select>
          </div>
        </div>
        <div class="currency-name" id="toCurrencyName">دولار أمريكي</div>
      </section>

      <button class="convert-btn" id="convertBtn" type="button">
        تحويل الآن
      </button>

      <div class="result-box hidden" id="resultBox" role="status" aria-live="polite">
        <div class="result-main" id="resultMain"></div>
        <div class="result-rate" id="resultRate"></div>
      </div>

      <div class="error-box hidden" id="errorBox" role="alert" aria-live="assertive">
        <span class="error-icon">⚠️</span>
        <span id="errorText"></span>
      </div>

    </main>

    <footer class="site-footer">
      آخر تحديث: <span id="lastUpdate">—</span>
      &nbsp;·&nbsp; يتجدد كل 5 دقائق
    </footer>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
